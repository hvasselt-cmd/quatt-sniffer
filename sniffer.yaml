uart:
  - id: quatt_sniffer
    rx_pin: GPIO18
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 1
    debug:
      direction: RX
      dummy_receiver: true
      after:
        timeout: 50ms
      sequence:
        - lambda: |-
            if (bytes.size() >= 4) {
              uint8_t slave_id = bytes[0];
              uint8_t func_code = bytes[1];
              if (func_code == 0x06 || func_code == 0x10) {
                 // Geen logging commando's in deze fase, puur stabiel blijven draaien
              }
            }
