esphome:
  name: sniffer
  friendly_name: Sniffer
  platformio_options:
    board_build.partitions: default.csv

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
    # DIT IS DE ENIGE JUISTE MANIER om USB-CDC te forceren zonder C++ conflicten
    # bij de S3-devkitc definitie.
    sdkconfig:
      CONFIG_ARDUINO_USB_CDC_ON_BOOT: "y"

