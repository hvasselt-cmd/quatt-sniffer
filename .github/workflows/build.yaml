name: Build ESPHome Firmware
on:
  push:
    paths:
      - 'sniffer.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # FIX: Geüpdatet naar v4
      - uses: actions/checkout@v4
      
      # FIX: Geüpdatet naar v5 en Python 3.11 voor maximale stabiliteit
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install ESPHome
        run: pip install esphome
        
      - name: Build Firmware
        run: esphome compile sniffer.yaml
        
      # FIX: Geüpdatet naar v4 om de GitHub blokkade op te lossen
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sniffer-firmware
          path: .esphome/build/sniffer/.pioenvs/sniffer/firmware.bin
